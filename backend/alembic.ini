# Alembic — PostgreSQL, async migrations via env.py (asyncpg + DATABASE_URL sync form for offline).
#
# sqlalchemy.url below is overwritten at runtime by env.py from SETTINGS.database_url / database_url_sync.
# For local tooling only; production should rely on DATABASE_URL env / .env

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Placeholder — env.py replaces this with DATABASE_URL-derived URL.
sqlalchemy.url = postgresql://analytics:analytics_secret@localhost:5432/analytics_db

# Revision file naming (stable, slug-based).
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(rev)s_%%(slug)s

# Optional: uncomment to truncate long identifiers in revisions
truncate_slug_length = 40

[post_write_hooks]

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
